services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hockeypool
      POSTGRES_USER: hockeypool
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://hockeypool:localdev@db:5432/hockeypool
      ADMIN_KEY: hockey2026
    depends_on:
      - db

volumes:
  pgdata:
